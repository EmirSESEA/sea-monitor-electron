name: Build & Publish Installers

on:
  push:
    tags:
      - 'v*.*.*'   # se activa con tags de versión como v1.0.0, v1.2.3

permissions:
  contents: write  # necesario para crear GitHub Releases y subir assets

jobs:
  # ─────────────────────────────────────────────────────────
  # Windows build (corre en windows-latest runner)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify icons exist
        run: |
          if (!(Test-Path "build/icon.ico")) {
            Write-Error "ERROR: build/icon.ico no encontrado. Asegúrate de incluir el archivo en el repositorio."
            exit 1
          }
          Write-Host "✅ Iconos verificados correctamente"

      - name: Build Windows installer
        env:
          # Deshabilitar firma de código (sin certificado)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.yml
            dist/*.blockmap
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # macOS build (corre en macos-latest runner)
  # ─────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify icons exist
        run: |
          if [ ! -f "build/icon.icns" ]; then
            echo "ERROR: build/icon.icns no encontrado. Asegúrate de incluir el archivo en el repositorio."
            exit 1
          fi
          echo "✅ Iconos verificados correctamente"

      - name: Build macOS DMG & ZIP
        env:
          # Deshabilitar firma de código (sin certificado Apple Developer)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
            dist/*.blockmap
          retention-days: 7
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Publicar release único en GitHub
  # ─────────────────────────────────────────────────────────
  publish-release:
    name: Create & Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: ./artifacts

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: ./artifacts

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ./artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Build Summary
        run: |
          echo "## 📦 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tag: **${{ github.ref_name }}**" >> $GITHUB_STEP_SUMMARY
          echo "Todos los instalables para Windows y macOS han sido empaquetados y subidos a la sección de Releases con éxito. ✅" >> $GITHUB_STEP_SUMMARY
