name: Build & Publish Installers

on:
  push:
    tags:
      - 'v*.*.*'   # se activa con tags de versión como v1.0.0, v1.2.3

permissions:
  contents: write  # necesario para crear GitHub Releases y subir assets

jobs:
  # ─────────────────────────────────────────────────────────
  # Windows build (corre en windows-latest runner)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify icons exist
        run: |
          if (!(Test-Path "build/icon.ico")) {
            Write-Error "ERROR: build/icon.ico no encontrado. Asegúrate de incluir el archivo en el repositorio."
            exit 1
          }
          Write-Host "✅ Iconos verificados correctamente"

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Deshabilitar firma de código (sin certificado)
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run publish:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            dist/*.exe
            dist/*.yml
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # macOS build (corre en macos-latest runner)
  # ─────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS Installer
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify icons exist
        run: |
          if [ ! -f "build/icon.icns" ]; then
            echo "ERROR: build/icon.icns no encontrado. Asegúrate de incluir el archivo en el repositorio."
            exit 1
          fi
          echo "✅ Iconos verificados correctamente"

      - name: Build macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Deshabilitar firma de código (sin certificado Apple Developer)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Si tienes certificado Apple Developer, descomenta estas líneas y agrega los secrets:
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run publish:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.yml
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────
  # Notificación de release completado
  # ─────────────────────────────────────────────────────────
  notify-release:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: always()

    steps:
      - name: Release status
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.build-windows.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | ${{ needs.build-macos.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag: **${{ github.ref_name }}**" >> $GITHUB_STEP_SUMMARY
